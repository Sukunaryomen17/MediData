<!DOCTYPE html>
<html>
<head>
    <title>MediData - Home</title>
</head>
<body>
    {% if user.is_authenticated %}
        <!-- Content for Logged-in Users -->
        <h1>Welcome, {{ user.first_name|default:user.username }}!</h1>
        <p>Status: <strong>{{ status }}</strong></p>
        
        <!-- Logout Button (Django 5.0+ requires POST for logout) -->
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>

    {% else %}
        <!-- Content for Guests -->
        <h1>Welcome to MediData</h1>
        <p>Please <a href="{% url 'login' %}">Login</a> or <a href="{% url 'register' %}">Register</a> to continue.</p>
    {% endif %}

    <hr>
    <p>This is your function-based homepage.</p>
</body>
</html>
